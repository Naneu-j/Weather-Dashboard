<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Zephyr — Weather</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --sky1:#FF6B35;--sky2:#F7931E;--sky3:#FFD166;--sky4:#2C3E6B;--sky5:#0F1729;
  --glass:rgba(255,255,255,0.08);
  --glass-border:rgba(255,255,255,0.14);
  --glass-hover:rgba(255,255,255,0.13);
  --text:#fff;
  --muted:rgba(255,255,255,0.55);
  --accent:#FFD166;
  --font-ui:'Outfit',sans-serif;
  --font-mono:'Space Mono',monospace;
}

html,body{height:100%;overflow:hidden}

body{
  font-family:var(--font-ui);
  color:var(--text);
  background:#0F1729;
  position:relative;
}

/* ── SKY BACKGROUND ── */
#sky{
  position:fixed;inset:0;z-index:0;
  background:linear-gradient(
    165deg,
    #0F1729 0%,
    #2C3E6B 20%,
    #6B3A6B 38%,
    #C05B3A 52%,
    #F4874B 63%,
    #FFB347 72%,
    #FFD580 80%,
    #FFE8A0 88%,
    #FFF4D0 100%
  );
  transition:background 3s ease;
}

/* Mountain silhouettes */
#mountains{
  position:fixed;bottom:0;left:0;right:0;z-index:1;pointer-events:none;
}

/* Sun / Moon orb */
#orb{
  position:fixed;z-index:1;pointer-events:none;
  width:110px;height:110px;border-radius:50%;
  right:20%;bottom:30%;
  background:radial-gradient(circle at 40% 38%,#FFF8DC 0%,#FFE066 30%,#FFC830 60%,#FFa020 100%);
  box-shadow:0 0 60px 20px rgba(255,200,50,0.35),0 0 120px 60px rgba(255,160,20,0.18);
  transition:all 3s ease;
}
#stars{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0;transition:opacity 2s}

/* Noise grain */
body::after{
  content:'';position:fixed;inset:0;z-index:2;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  opacity:0.6;
}

/* ── LAYOUT ── */
#app{
  position:relative;z-index:3;
  height:100vh;
  display:grid;
  grid-template-rows:auto 1fr auto;
  padding:0;
  overflow:hidden;
}

/* ── TOPBAR ── */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:1.4rem 2.5rem;
  background:rgba(15,23,41,0.25);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--glass-border);
}

.tb-left{display:flex;align-items:center;gap:1.5rem}

.brand{
  font-family:var(--font-mono);
  font-size:0.95rem;
  font-weight:700;
  letter-spacing:0.25em;
  text-transform:uppercase;
  color:var(--text);
}

.location-pill{
  display:flex;align-items:center;gap:0.5rem;
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:100px;
  padding:0.35rem 1rem 0.35rem 0.7rem;
  font-size:0.82rem;
  color:var(--muted);
  cursor:pointer;
  transition:all 0.2s;
}
.location-pill:hover{background:var(--glass-hover);color:var(--text)}
.location-pill svg{opacity:0.7;flex-shrink:0}

.search-wrap{
  display:flex;align-items:center;gap:0.5rem;
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:8px;
  padding:0.4rem 0.8rem;
  transition:border-color 0.2s;
}
.search-wrap:focus-within{border-color:rgba(255,255,255,0.3)}

.search-wrap input{
  background:none;border:none;outline:none;
  color:var(--text);font-family:var(--font-ui);font-size:0.85rem;
  width:180px;
}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap button{
  background:none;border:none;cursor:pointer;color:var(--muted);
  display:flex;align-items:center;padding:0;
  transition:color 0.2s;
}
.search-wrap button:hover{color:var(--text)}

.tb-right{display:flex;align-items:center;gap:1.2rem}

.unit-toggle{
  display:flex;align-items:center;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:6px;overflow:hidden;font-size:0.8rem;
  font-family:var(--font-mono);
}
.unit-toggle button{
  padding:0.35rem 0.7rem;border:none;cursor:pointer;
  background:transparent;color:var(--muted);
  transition:all 0.15s;
}
.unit-toggle button.active{background:rgba(255,255,255,0.18);color:var(--text)}

/* ── MAIN ── */
#main{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:0;
  overflow:hidden;
}

/* ── LEFT PANEL ── */
#left{
  padding:2.5rem 2rem;
  display:flex;flex-direction:column;gap:1.5rem;
  background:rgba(15,23,41,0.3);
  backdrop-filter:blur(16px);
  border-right:1px solid var(--glass-border);
  overflow-y:auto;
}

.now-time{font-size:0.78rem;color:var(--muted);font-family:var(--font-mono);letter-spacing:0.05em;margin-bottom:0.3rem}

.now-temp{
  font-family:var(--font-mono);
  font-size:5.5rem;font-weight:700;
  line-height:1;
  color:var(--text);
  letter-spacing:-0.03em;
}
.now-temp sup{font-size:2rem;vertical-align:super;opacity:0.7}

.now-condition{font-size:1.1rem;font-weight:300;color:var(--muted);margin-top:0.3rem}
.now-icon{font-size:3.5rem;margin:0.5rem 0;filter:drop-shadow(0 0 12px rgba(255,210,100,0.5))}

.feels-row{font-size:0.82rem;color:var(--muted)}
.feels-row span{color:var(--text)}

.sun-row{
  display:flex;gap:1rem;
  font-size:0.78rem;color:var(--muted);
  font-family:var(--font-mono);
}
.sun-row div{display:flex;flex-direction:column;gap:0.2rem}
.sun-row span{color:var(--text);font-size:0.9rem}

.divider{height:1px;background:var(--glass-border)}

.detail-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:1rem;
}
.detail-card{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:10px;padding:0.85rem 1rem;
}
.detail-card .d-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:0.4rem}
.detail-card .d-val{font-family:var(--font-mono);font-size:1.1rem;color:var(--text)}
.detail-card .d-unit{font-size:0.72rem;color:var(--muted);margin-left:0.2rem}

/* ── RIGHT PANEL ── */
#right{
  display:flex;flex-direction:column;gap:0;
  overflow:hidden;
}

/* Hourly */
#hourly-wrap{
  padding:1.5rem 2rem 1.2rem;
  background:rgba(15,23,41,0.2);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--glass-border);
}

.panel-label{
  font-size:0.7rem;text-transform:uppercase;letter-spacing:0.15em;
  color:var(--muted);font-family:var(--font-mono);margin-bottom:1rem;
}

.hourly-scroll{
  display:flex;gap:0.7rem;overflow-x:auto;padding-bottom:0.3rem;
  scrollbar-width:none;
}
.hourly-scroll::-webkit-scrollbar{display:none}

.hour-card{
  flex-shrink:0;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:10px;padding:0.75rem 0.9rem;
  display:flex;flex-direction:column;align-items:center;gap:0.3rem;
  min-width:72px;cursor:pointer;
  transition:all 0.2s;
}
.hour-card:hover,.hour-card.active{
  background:rgba(255,255,255,0.16);
  border-color:rgba(255,255,255,0.28);
}
.hour-card.active{border-color:var(--accent)}

.h-time{font-family:var(--font-mono);font-size:0.7rem;color:var(--muted)}
.h-icon{font-size:1.4rem}
.h-temp{font-family:var(--font-mono);font-size:0.88rem;font-weight:700;color:var(--text)}

/* Forecast */
#forecast-wrap{
  flex:1;overflow-y:auto;
  padding:1.5rem 2rem;
}
#forecast-wrap::-webkit-scrollbar{width:4px}
#forecast-wrap::-webkit-scrollbar-track{background:transparent}
#forecast-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:4px}

.forecast-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:0.7rem;
}

.day-card{
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:12px;padding:1rem 0.5rem;
  display:flex;flex-direction:column;align-items:center;gap:0.45rem;
  cursor:pointer;transition:all 0.2s;
}
.day-card:hover{background:var(--glass-hover);transform:translateY(-2px)}
.day-card.today{
  background:rgba(255,209,102,0.12);
  border-color:rgba(255,209,102,0.35);
}

.d-day{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);font-family:var(--font-mono)}
.d-date{font-size:0.68rem;color:rgba(255,255,255,0.35);font-family:var(--font-mono)}
.d-icon{font-size:1.8rem;margin:0.2rem 0;filter:drop-shadow(0 2px 6px rgba(0,0,0,0.3))}
.d-desc{font-size:0.65rem;color:var(--muted);text-align:center;line-height:1.3}
.d-temps{display:flex;flex-direction:column;align-items:center;gap:0.1rem;width:100%}
.d-max{font-family:var(--font-mono);font-size:0.9rem;color:var(--text)}
.d-min{font-family:var(--font-mono);font-size:0.75rem;color:var(--muted)}
.d-bar{width:100%;height:3px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;margin:0.1rem 0}
.d-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#4ECDC4,#FFD166)}

/* ── BOTTOM BAR ── */
#bottombar{
  padding:0.75rem 2.5rem;
  background:rgba(15,23,41,0.4);
  backdrop-filter:blur(12px);
  border-top:1px solid var(--glass-border);
  display:flex;align-items:center;justify-content:space-between;
  font-size:0.75rem;color:var(--muted);font-family:var(--font-mono);
}

/* ── LOADING STATE ── */
#loading{
  position:fixed;inset:0;z-index:100;
  background:#0F1729;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:1rem;transition:opacity 0.5s;
}
#loading .brand-big{
  font-family:var(--font-mono);font-size:1.4rem;letter-spacing:0.3em;color:var(--text);
}
#loading .loader{
  width:40px;height:2px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden;
}
#loading .loader::after{
  content:'';display:block;height:100%;width:40%;
  background:var(--accent);border-radius:2px;
  animation:slide 1s ease-in-out infinite;
}
@keyframes slide{
  0%{transform:translateX(-100%)}
  50%{transform:translateX(150%)}
  100%{transform:translateX(-100%)}
}
#loading.gone{opacity:0;pointer-events:none}

/* ── ERROR TOAST ── */
#error{
  position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
  background:rgba(220,80,60,0.9);backdrop-filter:blur(8px);
  border-radius:8px;padding:0.7rem 1.4rem;font-size:0.85rem;
  display:none;z-index:200;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.fade-up{animation:fadeUp 0.5s ease forwards}

.day-card{opacity:0;animation:fadeUp 0.4s ease forwards}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  #main{grid-template-columns:1fr}
  #left{border-right:none;border-bottom:1px solid var(--glass-border);padding:1.5rem}
  .now-temp{font-size:4rem}
  html,body{overflow:auto}
  #app{height:auto;grid-template-rows:auto auto auto auto}
}
@media(max-width:600px){
  #topbar{padding:1rem 1.2rem;flex-wrap:wrap;gap:0.7rem}
  .search-wrap input{width:120px}
  .forecast-grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="brand-big">ZEPHYR</div>
  <div class="loader"></div>
</div>

<!-- Sky background -->
<div id="sky"></div>
<!-- Sky orb (sun/moon) -->
<div id="orb"></div>
<!-- Stars canvas -->
<canvas id="stars"></canvas>

<!-- Mountains SVG -->
<div id="mountains">
<svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" style="display:block;width:100%;height:auto">
  <path d="M0,320 L0,200 L80,160 L160,190 L240,120 L320,150 L400,80 L480,110 L540,70 L600,100 L660,50 L720,80 L800,120 L880,60 L960,100 L1040,40 L1120,90 L1200,130 L1280,80 L1360,120 L1440,160 L1440,320 Z" fill="rgba(15,23,41,0.55)"/>
  <path d="M0,320 L0,240 L120,210 L200,230 L280,180 L360,200 L440,160 L520,185 L600,150 L680,170 L760,140 L840,165 L920,145 L1000,170 L1080,155 L1160,180 L1240,165 L1320,185 L1440,200 L1440,320 Z" fill="rgba(10,16,30,0.7)"/>
  <path d="M0,320 L0,270 L180,250 L360,255 L540,240 L720,250 L900,245 L1080,252 L1260,248 L1440,260 L1440,320 Z" fill="rgba(8,12,22,0.85)"/>
</svg>
</div>

<!-- Error toast -->
<div id="error"></div>

<div id="app">

  <!-- TOP BAR -->
  <div id="topbar">
    <div class="tb-left">
      <div class="brand">ZEPHYR</div>
      <div class="location-pill" id="locationPill">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span id="locationLabel">Loading…</span>
      </div>
    </div>
    <div class="search-wrap">
      <button id="searchBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <input id="searchInput" type="text" placeholder="Search city…" />
    </div>
    <div class="tb-right">
      <div class="unit-toggle">
        <button id="btnC" class="active" onclick="setUnit('C')">°C</button>
        <button id="btnF" onclick="setUnit('F')">°F</button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- LEFT: Current Conditions -->
    <div id="left">
      <div>
        <div class="now-time" id="nowTime">—</div>
        <div class="now-icon" id="nowIcon">🌤</div>
        <div class="now-temp" id="nowTemp">--<sup>°</sup></div>
        <div class="now-condition" id="nowCondition">—</div>
        <div class="feels-row" style="margin-top:0.5rem">Feels like <span id="nowFeels">--°</span></div>
      </div>
      <div class="sun-row" id="sunRow">
        <div><div style="font-size:0.7rem;margin-bottom:0.15rem">🌅 Sunrise</div><span id="sunrise">--:--</span></div>
        <div><div style="font-size:0.7rem;margin-bottom:0.15rem">🌇 Sunset</div><span id="sunset">--:--</span></div>
      </div>
      <div class="divider"></div>
      <div class="detail-grid">
        <div class="detail-card"><div class="d-label">Wind</div><div class="d-val"><span id="wind">--</span><span class="d-unit" data-unit="wind">m/s</span></div></div>
        <div class="detail-card"><div class="d-label">Humidity</div><div class="d-val"><span id="humidity">--</span><span class="d-unit">%</span></div></div>
        <div class="detail-card"><div class="d-label">Pressure</div><div class="d-val"><span id="pressure">--</span><span class="d-unit">hPa</span></div></div>
        <div class="detail-card"><div class="d-label">Visibility</div><div class="d-val"><span id="visibility">--</span><span class="d-unit">km</span></div></div>
        <div class="detail-card"><div class="d-label">UV Index</div><div class="d-val"><span id="uvIndex">--</span></div></div>
        <div class="detail-card"><div class="d-label">Precip.</div><div class="d-val"><span id="precip">--</span><span class="d-unit">%</span></div></div>
      </div>
    </div>

    <!-- RIGHT: Hourly + Forecast -->
    <div id="right">
      <div id="hourly-wrap">
        <div class="panel-label">Today — Hourly</div>
        <div class="hourly-scroll" id="hourlyScroll"></div>
      </div>
      <div id="forecast-wrap">
        <div class="panel-label">7-Day Forecast</div>
        <div class="forecast-grid" id="forecastGrid"></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM BAR -->
  <div id="bottombar">
    <span id="updateTime">Last updated: —</span>
    <span>Powered by Open-Meteo</span>
  </div>
</div>

<script>
const API_KEY = ''; // Using Open-Meteo (free, no key needed)

let unit = 'C';
let currentLat = null, currentLon = null;
let weatherData = null;

// ── WEATHER CODE MAPS ──
const WMO = {
  0:{icon:'☀️',desc:'Clear sky'},
  1:{icon:'🌤',desc:'Mainly clear'},2:{icon:'⛅',desc:'Partly cloudy'},3:{icon:'☁️',desc:'Overcast'},
  45:{icon:'🌫',desc:'Fog'},48:{icon:'🌫',desc:'Icy fog'},
  51:{icon:'🌦',desc:'Light drizzle'},53:{icon:'🌦',desc:'Drizzle'},55:{icon:'🌧',desc:'Heavy drizzle'},
  61:{icon:'🌧',desc:'Light rain'},63:{icon:'🌧',desc:'Rain'},65:{icon:'🌧',desc:'Heavy rain'},
  71:{icon:'🌨',desc:'Light snow'},73:{icon:'❄️',desc:'Snow'},75:{icon:'❄️',desc:'Heavy snow'},
  77:{icon:'🌨',desc:'Snow grains'},
  80:{icon:'🌦',desc:'Light showers'},81:{icon:'🌧',desc:'Showers'},82:{icon:'⛈',desc:'Heavy showers'},
  85:{icon:'🌨',desc:'Snow showers'},86:{icon:'❄️',desc:'Heavy snow showers'},
  95:{icon:'⛈',desc:'Thunderstorm'},96:{icon:'⛈',desc:'Thunderstorm + hail'},99:{icon:'⛈',desc:'Thunderstorm + hail'},
};
function wmo(code){return WMO[code]||{icon:'🌡',desc:'Unknown'}}

// ── SKY GRADIENT BY CONDITION/HOUR ──
function updateSky(code, hour){
  const sky = document.getElementById('sky');
  const orb  = document.getElementById('orb');
  const stars = document.getElementById('stars');
  let g;
  const isNight = hour < 6 || hour >= 20;
  const isDawn  = hour >= 5 && hour < 8;
  const isDusk  = hour >= 17 && hour < 20;
  const isDay   = hour >= 8 && hour < 17;

  if(isNight){
    g='linear-gradient(165deg,#020510 0%,#050c1f 40%,#0a1535 70%,#0F1729 100%)';
    orb.style.cssText='width:70px;height:70px;right:20%;bottom:55%;background:radial-gradient(circle at 38% 38%,#fff 0%,#e8eef8 40%,#c8d8f0 100%);box-shadow:0 0 40px 15px rgba(180,200,255,0.25),0 0 80px 40px rgba(120,160,255,0.1);transition:all 3s ease';
    stars.style.opacity='1';
  } else if(isDawn){
    g='linear-gradient(165deg,#0F1729 0%,#2C3E6B 18%,#6B3A6B 35%,#C05B3A 50%,#F4874B 62%,#FFB347 72%,#FFD580 82%,#FFF4D0 100%)';
    orb.style.cssText='width:90px;height:90px;right:18%;bottom:25%;background:radial-gradient(circle at 40% 38%,#FFF8DC 0%,#FFE066 30%,#FFC830 60%,#FF8020 100%);box-shadow:0 0 80px 30px rgba(255,180,50,0.5),0 0 160px 80px rgba(255,120,20,0.25);transition:all 3s ease';
    stars.style.opacity='0.3';
  } else if(isDusk){
    g='linear-gradient(165deg,#0F1729 0%,#1a2a5e 15%,#4a2060 30%,#8B2252 44%,#D4502A 56%,#F07030 66%,#F8A830 76%,#FFD580 88%,#FFE8B0 100%)';
    orb.style.cssText='width:100px;height:100px;right:16%;bottom:20%;background:radial-gradient(circle at 40% 42%,#FFF0C0 0%,#FFCC44 25%,#FF9020 55%,#E05010 100%);box-shadow:0 0 80px 30px rgba(255,150,30,0.55),0 0 180px 90px rgba(220,80,20,0.3);transition:all 3s ease';
    stars.style.opacity='0';
  } else if(code>=95){
    g='linear-gradient(165deg,#1a1a2e 0%,#2d2d44 30%,#3d3d55 60%,#4a4a60 100%)';
    orb.style.cssText='opacity:0;transition:all 3s ease';
    stars.style.opacity='0';
  } else if(code>=61){
    g='linear-gradient(165deg,#1e2a3a 0%,#2a3a4e 30%,#3a4a5e 60%,#4a5a70 100%)';
    orb.style.cssText='opacity:0;transition:all 3s ease';
    stars.style.opacity='0';
  } else if(code>=45){
    g='linear-gradient(165deg,#2a2e3a 0%,#3a3e4a 30%,#4a4e5a 60%,#5a5e6a 100%)';
    orb.style.cssText='width:90px;height:90px;right:20%;bottom:35%;opacity:0.4;background:radial-gradient(circle at 40%,#fff 0%,#eee 100%);box-shadow:none;transition:all 3s ease';
    stars.style.opacity='0';
  } else if(isDay){
    g='linear-gradient(165deg,#0a2a6e 0%,#1a4a9e 20%,#2a6abe 40%,#4a8ad8 60%,#6aaae8 80%,#8abaf5 100%)';
    orb.style.cssText='width:110px;height:110px;right:20%;bottom:42%;background:radial-gradient(circle at 40% 38%,#FFF8DC 0%,#FFE066 30%,#FFC830 60%,#FFa020 100%);box-shadow:0 0 60px 20px rgba(255,200,50,0.35),0 0 120px 60px rgba(255,160,20,0.18);transition:all 3s ease';
    stars.style.opacity='0';
  } else {
    g='linear-gradient(165deg,#0F1729 0%,#2C3E6B 30%,#4a7aaa 60%,#6aaad0 100%)';
    orb.style.cssText='width:110px;height:110px;right:20%;bottom:30%;background:radial-gradient(circle at 40% 38%,#FFF8DC 0%,#FFE066 30%,#FFC830 60%,#FFa020 100%);box-shadow:0 0 60px 20px rgba(255,200,50,0.35),0 0 120px 60px rgba(255,160,20,0.18);transition:all 3s ease';
    stars.style.opacity='0';
  }

  sky.style.background = g;
}

// ── STARS ──
(function(){
  const c=document.getElementById('stars');
  function resize(){c.width=window.innerWidth;c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  const ctx=c.getContext('2d');
  const stars=Array.from({length:180},()=>({
    x:Math.random(),y:Math.random()*0.7,
    r:Math.random()*1.2+0.3,
    o:Math.random()*0.7+0.2,
    speed:Math.random()*0.003+0.001
  }));
  let t=0;
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    t+=0.016;
    stars.forEach(s=>{
      const twinkle=s.o*(0.7+0.3*Math.sin(t*s.speed*60+s.x*100));
      ctx.beginPath();
      ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${twinkle})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── UNIT CONVERSION ──
function toDisplay(c){ return unit==='C' ? Math.round(c) : Math.round(c*9/5+32) }
function unitLabel(){ return unit==='C'?'°C':'°F' }

function setUnit(u){
  unit=u;
  document.getElementById('btnC').classList.toggle('active',u==='C');
  document.getElementById('btnF').classList.toggle('active',u==='F');
  if(weatherData) renderAll(weatherData);
}

// ── TIME FORMAT ──
function fmtTime(isoStr){
  const d=new Date(isoStr);
  return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false});
}
function fmtHour(isoStr){
  const d=new Date(isoStr);
  const h=d.getHours();
  if(h===0) return '12AM';
  if(h===12) return '12PM';
  return h>12?`${h-12}PM`:`${h}AM`;
}
function fmtDay(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  return d.toLocaleDateString([],{weekday:'short'});
}
function fmtDate(dateStr){
  const d=new Date(dateStr+'T12:00:00');
  return d.toLocaleDateString([],{month:'short',day:'numeric'});
}

// ── RENDER ──
function renderAll(data){
  weatherData = data;
  const cur = data.current;
  const daily = data.daily;
  const hourly = data.hourly;

  // Current
  const now = new Date();
  document.getElementById('nowTime').textContent =
    now.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'}) + ' · ' +
    now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});

  const w = wmo(cur.weather_code);
  document.getElementById('nowIcon').textContent = w.icon;
  document.getElementById('nowTemp').innerHTML = `${toDisplay(cur.temperature_2m)}<sup>${unitLabel()}</sup>`;
  document.getElementById('nowCondition').textContent = w.desc;
  document.getElementById('nowFeels').textContent = `${toDisplay(cur.apparent_temperature)}${unitLabel()}`;
  document.getElementById('wind').textContent = unit==='C'
    ? cur.wind_speed_10m.toFixed(1)
    : (cur.wind_speed_10m * 0.621371).toFixed(1);
  document.querySelector('[data-unit="wind"]').textContent = unit==='C' ? 'm/s' : 'mph';
  document.getElementById('humidity').textContent = cur.relative_humidity_2m;
  document.getElementById('pressure').textContent = Math.round(cur.surface_pressure||1013);

  // These are hourly-only on Open-Meteo — grab the closest hour index
  const nowHourIdx = Math.max(0, hourly.time.findIndex(t => new Date(t) >= now));
  document.getElementById('visibility').textContent = hourly.visibility?.[nowHourIdx] != null
    ? (hourly.visibility[nowHourIdx]/1000).toFixed(1) : '--';
  document.getElementById('uvIndex').textContent = hourly.uv_index?.[nowHourIdx] != null
    ? hourly.uv_index[nowHourIdx].toFixed(0) : '--';
  document.getElementById('precip').textContent = hourly.precipitation_probability?.[nowHourIdx] != null
    ? hourly.precipitation_probability[nowHourIdx] : '--';

  // Sunrise/sunset
  if(daily.sunrise&&daily.sunrise[0]){
    document.getElementById('sunrise').textContent = fmtTime(daily.sunrise[0]);
    document.getElementById('sunset').textContent = fmtTime(daily.sunset[0]);
  }

  // Sky
  updateSky(cur.weather_code, now.getHours());

  // Hourly (next 24h) — reuse nowHourIdx computed above
  const hourlyScroll = document.getElementById('hourlyScroll');
  hourlyScroll.innerHTML='';
  const start = nowHourIdx;
  for(let i=start;i<Math.min(start+24,hourly.time.length);i++){
    const card=document.createElement('div');
    card.className='hour-card'+(i===start?' active':'');
    const hw=wmo(hourly.weather_code[i]);
    card.innerHTML=`<div class="h-time">${fmtHour(hourly.time[i])}</div><div class="h-icon">${hw.icon}</div><div class="h-temp">${toDisplay(hourly.temperature_2m[i])}°</div>`;
    hourlyScroll.appendChild(card);
  }

  // 7-day forecast
  const grid = document.getElementById('forecastGrid');
  grid.innerHTML='';
  const todayStr = now.toISOString().slice(0,10);
  const maxAll = daily.temperature_2m_max.map(v=>v);
  const minAll = daily.temperature_2m_min.map(v=>v);
  const absMax = Math.max(...maxAll);
  const absMin = Math.min(...minAll);
  const range = absMax - absMin || 1;

  daily.time.forEach((day,i)=>{
    const card=document.createElement('div');
    card.className='day-card'+(day===todayStr?' today':'');
    card.style.animationDelay=`${i*0.05}s`;
    const dw=wmo(daily.weather_code[i]);
    const maxT=toDisplay(daily.temperature_2m_max[i]);
    const minT=toDisplay(daily.temperature_2m_min[i]);
    const barW = Math.round(((daily.temperature_2m_max[i]-absMin)/range)*100);
    card.innerHTML=`
      <div class="d-day">${day===todayStr?'Today':fmtDay(day)}</div>
      <div class="d-date">${fmtDate(day)}</div>
      <div class="d-icon">${dw.icon}</div>
      <div class="d-desc">${dw.desc}</div>
      <div class="d-temps">
        <div class="d-max">${maxT}°</div>
        <div class="d-bar"><div class="d-bar-fill" style="width:${barW}%"></div></div>
        <div class="d-min">${minT}°</div>
      </div>`;
    grid.appendChild(card);
  });

  document.getElementById('updateTime').textContent =
    'Last updated: ' + now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

// ── FETCH WEATHER ──
async function fetchWeather(lat, lon, cityName){
  document.getElementById('locationLabel').textContent = cityName || 'Detecting…';
  showLoading(true);

  try{
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`+
      `&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m,surface_pressure`+
      `&hourly=temperature_2m,weather_code,visibility,uv_index,precipitation_probability`+
      `&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset`+
      `&timezone=auto&forecast_days=7`;

    const r=await fetch(url);
    if(!r.ok) throw new Error('API error');
    const data=await r.json();
    renderAll(data);
    if(cityName) document.getElementById('locationLabel').textContent = cityName;
    showLoading(false);
  }catch(e){
    console.error('Weather fetch error:', e);
    showError('Could not load weather data. Try again.');
    showLoading(false);
  }
}

// ── GEOCODING (city name → lat/lon) ──
async function geocode(city){
  const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
  const data=await r.json();
  if(!data.results||!data.results.length) throw new Error('City not found');
  return data.results[0];
}

// ── GEOLOCATION ──
function detectLocation(){
  if(!navigator.geolocation){fetchWeather(-1.286,-36.817,'Nairobi');return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{
      currentLat=pos.coords.latitude;
      currentLon=pos.coords.longitude;
      reverseGeocode(currentLat,currentLon);
    },
    ()=>fetchWeather(-1.286,36.817,'Nairobi')
  );
}

async function reverseGeocode(lat,lon){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
    const data=await r.json();
    const city=data.address.city||data.address.town||data.address.village||data.address.county||'Your Location';
    fetchWeather(lat,lon,city);
  }catch{
    fetchWeather(lat,lon,'Your Location');
  }
}

// ── SEARCH ──
async function doSearch(){
  const val=document.getElementById('searchInput').value.trim();
  if(!val) return;
  try{
    const res=await geocode(val);
    currentLat=res.latitude;currentLon=res.longitude;
    fetchWeather(res.latitude,res.longitude,res.name+', '+(res.country||''));
    document.getElementById('searchInput').value='';
  }catch{
    showError('City not found. Try another name.');
  }
}

document.getElementById('searchBtn').addEventListener('click',doSearch);
document.getElementById('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});

// ── LOADING / ERROR ──
function showLoading(show){
  const el=document.getElementById('loading');
  if(show){el.style.opacity='1';el.style.pointerEvents='auto';el.classList.remove('gone');}
  else{el.classList.add('gone');}
}
function showError(msg){
  const el=document.getElementById('error');
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>el.style.display='none',3500);
}

// ── CLOCK TICK ──
function tickClock(){
  const el=document.getElementById('nowTime');
  if(!el) return;
  const now=new Date();
  el.textContent=now.toLocaleDateString([],{weekday:'long',month:'long',day:'numeric'})+' · '+now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
setInterval(tickClock,30000);

// ── INIT ──
detectLocation();
</script>
